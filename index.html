<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mariposa NLP | Refined Analytics</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    
    <style>
        :root {
            --bg: #f3f4f6; --surface: #ffffff; --border: #e5e7eb;
            --text: #1f2937; --text-light: #6b7280;
            --primary: #be185d; --primary-hover: #9d174d;
            --success: #059669; --danger: #dc2626;
            --radius: 12px; --shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }
        
        [data-theme="dark"] {
            --bg: #111827; --surface: #1f2937; --border: #374151;
            --text: #f9fafb; --text-light: #9ca3af;
            --primary: #ec4899; --primary-hover: #f472b6;
        }

        * { box-sizing: border-box; transition: background 0.2s, color 0.2s; }
        
        body { 
            font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); 
            margin: 0; display: flex; flex-direction: column; min-height: 100vh; 
        }

        /* Navigation */
        nav {
            background: var(--surface); border-bottom: 1px solid var(--border);
            padding: 1rem 1.5rem; display: flex; justify-content: space-between; align-items: center;
            position: sticky; top: 0; z-index: 100;
        }

        .container { max-width: 1100px; margin: 0 auto; width: 100%; padding: 20px; }

        /* Stats Grid */
        .stats-grid { 
            display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); 
            gap: 15px; margin-bottom: 25px; 
        }
        .stat-card { 
            background: var(--surface); padding: 20px; border-radius: var(--radius); 
            border: 1px solid var(--border); text-align: center; box-shadow: var(--shadow);
        }
        .stat-card h4 { margin: 0; font-size: 0.75rem; color: var(--text-light); text-transform: uppercase; }
        .stat-card p { margin: 10px 0 0; font-size: 1.5rem; font-weight: 700; }

        /* Input Area */
        .analysis-box {
            background: var(--surface); padding: 25px; border-radius: var(--radius);
            border: 1px solid var(--border); box-shadow: var(--shadow); margin-bottom: 25px;
        }
        .analysis-box h2 { margin-top: 0; font-size: 1.25rem; }
        
        textarea { 
            width: 100%; border: 2px solid var(--border); border-radius: 8px; 
            padding: 15px; font-size: 1rem; background: var(--bg); color: var(--text);
            resize: vertical; min-height: 150px; margin-bottom: 15px;
        }
        textarea:focus { border-color: var(--primary); outline: none; }

        .btn-group { display: flex; gap: 10px; flex-wrap: wrap; }
        .btn { 
            padding: 12px 24px; border-radius: 8px; border: none; font-weight: 600; 
            cursor: pointer; display: flex; align-items: center; gap: 8px; font-size: 0.9rem;
        }
        .btn-primary { background: var(--primary); color: white; }
        .btn-primary:hover { background: var(--primary-hover); }
        .btn-secondary { background: var(--surface); color: var(--text); border: 1px solid var(--border); }
        .btn-danger { background: #fee2e2; color: #b91c1c; }

        /* Results Feed */
        .feed-item {
            background: var(--surface); border: 1px solid var(--border);
            padding: 15px; border-radius: 10px; margin-bottom: 10px;
            display: grid; grid-template-columns: 1fr auto; gap: 10px;
        }
        .category-tag {
            font-size: 0.7rem; font-weight: 700; padding: 4px 8px;
            border-radius: 4px; text-transform: uppercase; background: var(--bg);
        }

        @media (max-width: 768px) {
            .stats-grid { grid-template-columns: repeat(2, 1fr); }
            .feed-item { grid-template-columns: 1fr; }
        }

        #chartContainer {
            height: 300px; margin-bottom: 25px; background: var(--surface);
            padding: 20px; border-radius: var(--radius); border: 1px solid var(--border);
        }
    </style>
</head>
<body>

<nav>
    <div style="font-weight: 800; font-size: 1.4rem; color: var(--primary);">🦋 Mariposa NLP</div>
    <div class="btn-group">
        <button class="btn btn-secondary" onclick="toggleDarkMode()">🌓 Dark Mode</button>
        <button class="btn btn-secondary" onclick="exportData()">📊 Export Excel</button>
    </div>
</nav>

<div class="container">
    <div class="stats-grid" id="statsGrid">
        <div class="stat-card"><h4>Effectiveness</h4><p id="count-effectiveness">0</p></div>
        <div class="stat-card"><h4>Side Effects</h4><p id="count-side-effects">0</p></div>
        <div class="stat-card"><h4>Pricing</h4><p id="count-pricing">0</p></div>
        <div class="stat-card"><h4>Packaging</h4><p id="count-packaging">0</p></div>
        <div class="stat-card"><h4>Delivery</h4><p id="count-delivery">0</p></div>
        <div class="stat-card"><h4>Authenticity</h4><p id="count-authenticity">0</p></div>
    </div>

    <div class="analysis-box">
        <h2>Bulk Analysis Engine</h2>
        <p style="color: var(--text-light); font-size: 0.9rem;">Paste up to 100+ reviews below or upload a CSV file.</p>
        <textarea id="bulkInput" placeholder="Paste your reviews here... (One per line)"></textarea>
        <div class="btn-group">
            <button class="btn btn-primary" onclick="processAnalysis()">Analyze Sentiments</button>
            <label class="btn btn-secondary">
                📥 Import CSV
                <input type="file" id="csvFile" hidden accept=".csv" onchange="importCSV(this)">
            </label>
            <button class="btn btn-danger" onclick="clearData()">Clear</button>
        </div>
    </div>

    <div id="chartContainer">
        <canvas id="categoryChart"></canvas>
    </div>

    <div id="resultsFeed">
        </div>
</div>

<script>
    let analyzedData = [];
    let myChart = null;

    const KEYWORDS = {
        effectiveness: ['effective', 'wala nangyari', 'hindi tumalab', 'glass skin', 'dark spots', 'improvement', 'pores', 'glow', 'result', 'sayang pera', 'hindi gumana', 'budol'],
        sideEffects: ['hapdi', 'breakout', 'tiyawat', 'acne', 'namula', 'nangati', 'rashes', 'allergy', 'nasunog', 'peeling', 'dry', 'cystic', 'matapang'],
        pricing: ['mahal', 'presyo', 'overpriced', 'sulit', 'mura', 'price', 'budget', 'shipping', 'gastos'],
        packaging: ['leak', 'tapon', 'basag', 'takip', 'seal', 'box', 'lalagyan', 'bawas', 'bubble wrap', 'parcel', 'nayupi'],
        delivery: ['tagal', 'rider', 'ship', 'courier', 'maling set', 'receive', 'tracking', 'status', 'deliver'],
        authenticity: ['fake', 'original', 'orig', 'authentic', 'zonrox', 'qr code', 'hologram', 'sticker', 'expired', 'repacked']
    };

    function processAnalysis() {
        const text = document.getElementById('bulkInput').value;
        if (!text.trim()) return;

        const lines = text.split('\n').filter(line => line.trim() !== "");
        
        lines.forEach(line => {
            const result = categorizeSentiment(line);
            analyzedData.unshift(result);
        });

        renderUI();
        document.getElementById('bulkInput').value = "";
    }

    function categorizeSentiment(text) {
        const lowText = text.toLowerCase();
        let category = "General";
        const date = new Date().toLocaleString();

        for (const [key, words] of Object.entries(KEYWORDS)) {
            if (words.some(word => lowText.includes(word))) {
                category = key.replace(/([A-Z])/g, ' $1').trim(); // Format camelCase to spaces
                break;
            }
        }

        // Logic formatting for UI
        const formattedCat = category.charAt(0).toUpperCase() + category.slice(1);

        return {
            text: text,
            category: formattedCat,
            timestamp: date,
            sentiment: "Negative" // Focused on negative painpoints as per prompt
        };
    }

    function renderUI() {
        const feed = document.getElementById('resultsFeed');
        feed.innerHTML = "";
        
        const counts = { effectiveness: 0, sideEffects: 0, pricing: 0, packaging: 0, delivery: 0, authenticity: 0 };

        analyzedData.forEach(item => {
            const catKey = item.category.toLowerCase().replace(" ", "");
            if (counts.hasOwnProperty(catKey)) counts[catKey]++;

            const div = document.createElement('div');
            div.className = 'feed-item';
            div.innerHTML = `
                <div>
                    <div class="category-tag">${item.category}</div>
                    <p style="margin: 8px 0; font-weight: 500;">${item.text}</p>
                    <small style="color: var(--text-light)">${item.timestamp}</small>
                </div>
                <div style="color: var(--danger); font-weight: 700; font-size: 0.8rem;">NEGATIVE</div>
            `;
            feed.appendChild(div);
        });

        // Update Stats
        for (const [key, val] of Object.entries(counts)) {
            const id = `count-${key.replace(/([A-Z])/g, '-$1').toLowerCase()}`;
            const el = document.getElementById(id);
            if(el) el.innerText = val;
        }

        updateChart(counts);
    }

    function updateChart(counts) {
        const ctx = document.getElementById('categoryChart').getContext('2d');
        const data = Object.values(counts);
        const labels = ['Effectiveness', 'Side Effects', 'Pricing', 'Packaging', 'Delivery', 'Authenticity'];

        if (myChart) myChart.destroy();

        myChart = new Chart(ctx, {
            type: 'bar',
            data: {
                labels: labels,
                datasets: [{
                    label: 'Painpoint Volume',
                    data: data,
                    backgroundColor: '#be185d',
                    borderRadius: 5
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                scales: {
                    y: { beginAtZero: true, grid: { display: false } },
                    x: { grid: { display: false } }
                }
            }
        });
    }

    function importCSV(input) {
        const file = input.files[0];
        const reader = new FileReader();
        reader.onload = function(e) {
            const text = e.target.result;
            document.getElementById('bulkInput').value = text;
            processAnalysis();
        };
        reader.readAsText(file);
    }

    function exportData() {
        if (analyzedData.length === 0) return alert("No data to export");
        
        let csvContent = "data:text/csv;charset=utf-8,Sentiment,Categorized Painpoint,Time & Date\n";
        analyzedData.forEach(row => {
            csvContent += `"${row.text.replace(/"/g, '""')}",${row.category},${row.timestamp}\n`;
        });

        const encodedUri = encodeURI(csvContent);
        const link = document.createElement("a");
        link.setAttribute("href", encodedUri);
        link.setAttribute("download", "Mariposa_Analysis.csv");
        document.body.appendChild(link);
        link.click();
    }

    function toggleDarkMode() {
        const body = document.body;
        const current = body.getAttribute('data-theme');
        body.setAttribute('data-theme', current === 'dark' ? 'light' : 'dark');
    }

    function clearData() {
        analyzedData = [];
        renderUI();
    }
</script>

</body>
</html>
